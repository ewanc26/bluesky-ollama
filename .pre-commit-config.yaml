# Pre-commit hooks for code formatting.
# Uses system-level prettier to avoid per-repo node_modules.

repos:
  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: npx prettier --write --ignore-unknown
        language: system
        types_or: [javascript, jsx, ts, tsx, json, yaml, markdown, css]
        pass_filenames: true
